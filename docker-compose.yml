services:
  api:
    build: .
    container_name: polymatrix_api
    restart: always
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres_password@postgres:5432/polymatrix
      - REDIS_URL=redis://redis:6379/0
      - PM_WS_URL=wss://ws-subscriptions-clob.polymarket.com/ws/market
      - PM_API_URL=https://clob.polymarket.com
      - PM_CHAIN_ID=137
      - PK=${PK}
      - FUNDER_ADDRESS=${FUNDER_ADDRESS}
      - LIVE_TRADING_ENABLED=${LIVE_TRADING_ENABLED:-False}
      - MAX_EXPOSURE_PER_MARKET=${MAX_EXPOSURE_PER_MARKET:-50.0}
      - EXPOSURE_TOLERANCE=${EXPOSURE_TOLERANCE:-0.01}
      - TRADING_LOG_PATH=/app/data/logs/trading.log
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ./.env:/app/.env
      # Shared log volume so dashboard can read trading.log
      - logs_data:/app/data/logs

  dashboard:
    build: .
    container_name: polymatrix_dashboard
    restart: always
    ports:
      - "8501:8501"
    command: streamlit run dashboard/app.py --server.port 8501 --server.address 0.0.0.0
    environment:
      - DATABASE_URL=postgresql+psycopg2://postgres:postgres_password@postgres:5432/polymatrix
      - API_URL=http://api:8000
      - TRADING_LOG_PATH=/app/data/logs/trading.log
    volumes:
      - ./.env:/app/.env
      # Mount the same logs volume used by the API so we can read trading.log
      - logs_data:/app/data/logs
    depends_on:
      - api
      - postgres

  postgres:
    image: postgres:15-alpine
    container_name: polymatrix_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres_password
      POSTGRES_DB: polymatrix
    ports:
      - "${DB_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d polymatrix"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: polymatrix_redis
    restart: always
    ports:
      - "6380:6379"   # host 6380 so 6379 is free for e.g. ThetaMind (override with REDIS_PORT in .env if needed)
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes

volumes:
  postgres_data:
  redis_data:
  logs_data: