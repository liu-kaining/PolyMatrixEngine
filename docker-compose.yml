services:
  api:
    build: .
    container_name: polymatrix_api
    restart: always
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres_password@postgres:5432/polymatrix
      - REDIS_URL=redis://redis:6379/0
      - PM_WS_URL=wss://ws-subscriptions-clob.polymarket.com/ws/market
      - PM_API_URL=https://clob.polymarket.com
      - PM_CHAIN_ID=137
      - PK=${PK} # Inherit from host .env
      - FUNDER_ADDRESS=${FUNDER_ADDRESS}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ./.env:/app/.env

  postgres:
    image: postgres:15-alpine
    container_name: polymatrix_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres_password
      POSTGRES_DB: polymatrix
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d polymatrix"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: polymatrix_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes

volumes:
  postgres_data:
  redis_data: